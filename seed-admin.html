<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seed Admin User</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            display: block;
        }
        .credentials {
            background: #f8f9fa;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        .credentials.show {
            display: block;
        }
        .credentials h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .credentials p {
            margin: 8px 0;
            font-size: 14px;
            color: #333;
        }
        .credentials strong {
            color: #764ba2;
        }
        .warning {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Seed Admin User</h1>
        <p class="subtitle">Create the initial admin account for your Hackathon Platform</p>

        <div class="input-group">
            <label for="apiUrl">Backend API URL</label>
            <input 
                type="text" 
                id="apiUrl" 
                placeholder="https://your-backend.vercel.app"
                value=""
            >
        </div>

        <button id="seedBtn" onclick="seedAdmin()">Create Admin User</button>

        <div id="message" class="message"></div>

        <div id="credentials" class="credentials">
            <h3>✅ Admin Created Successfully!</h3>
            <p><strong>Email:</strong> admin@hackathon.com</p>
            <p><strong>Password:</strong> admin123</p>
            <div class="warning">
                ⚠️ <strong>Important:</strong> Please change the password after your first login for security!
            </div>
        </div>
    </div>

    <script>
        async function seedAdmin() {
            const apiUrl = document.getElementById('apiUrl').value.trim();
            const messageDiv = document.getElementById('message');
            const credentialsDiv = document.getElementById('credentials');
            const seedBtn = document.getElementById('seedBtn');

            if (!apiUrl) {
                showMessage('Please enter your Backend API URL', 'error');
                return;
            }

            seedBtn.disabled = true;
            seedBtn.textContent = 'Creating Admin...';

            try {
                const response = await fetch(`${apiUrl}/auth/seed-admin`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('✅ ' + data.message, 'success');
                    credentialsDiv.classList.add('show');
                } else {
                    showMessage('❌ ' + data.message, 'error');
                }
            } catch (error) {
                showMessage('❌ Failed to connect to backend. Check your API URL.', 'error');
            } finally {
                seedBtn.disabled = false;
                seedBtn.textContent = 'Create Admin User';
            }
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
        }
    </script>
</body>
</html>
